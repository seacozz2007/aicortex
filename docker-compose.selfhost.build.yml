# Development override: build the backend/web images from the current checkout
# instead of pulling the official GHCR images.

services:
  backend:
    image: aicortex-backend:dev
    build:
      context: .
      dockerfile: Dockerfile

  frontend:
    image: aicortex-web:dev
    build:
      context: .
      dockerfile: Dockerfile.web
      args:
        REMOTE_API_URL: http://backend:8080
        NEXT_PUBLIC_WS_URL: ${NEXT_PUBLIC_WS_URL:-}
        NEXT_PUBLIC_APP_VERSION: dev
        NEXT_PUBLIC_BASE_PATH: ${NEXT_PUBLIC_BASE_PATH:-}
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-}
        # For Chinese users: set to https://registry.npmmirror.com in a .env file
        NPM_REGISTRY_MIRROR: ${NPM_REGISTRY_MIRROR:-}
