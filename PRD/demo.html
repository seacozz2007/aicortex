<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>AICortex Virtual Office Demo</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #0f0f1a; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; font-family: 'Courier New', monospace; color: #fff; }
h1 { margin-bottom: 4px; font-size: 16px; color: #7fdbca; letter-spacing: 1px; }
p.sub { margin-bottom: 12px; font-size: 11px; color: #666; }
canvas { image-rendering: pixelated; image-rendering: crisp-edges; border-radius: 4px; box-shadow: 0 0 40px rgba(100,200,180,0.1); }
.controls { margin-top: 14px; display: flex; gap: 6px; flex-wrap: wrap; justify-content: center; }
.controls button { background: #1e1e30; border: 1px solid #3a3a5a; color: #aaa; padding: 5px 10px; cursor: pointer; font-family: monospace; font-size: 10px; border-radius: 4px; transition: all .15s; }
.controls button:hover { background: #2a2a44; color: #fff; border-color: #7fdbca; }
.tooltip { position: fixed; background: #1a1a2e; border: 1px solid #4a4a6a; padding: 6px 10px; font-size: 11px; color: #ddd; pointer-events: none; display: none; border-radius: 4px; z-index: 10; box-shadow: 0 2px 8px rgba(0,0,0,.5); }
</style>
</head>
<body>
<h1>🏢 AICortex Agent Virtual Office</h1>
<p class="sub">2.5D Pixel Art — Real-time Agent Status Demo</p>
<canvas id="office" width="640" height="400"></canvas>
<div class="controls">
  <button onclick="triggerEvent('complete')">✅ Complete</button>
  <button onclick="triggerEvent('fail')">❌ Failed</button>
  <button onclick="triggerEvent('dispatch')">📋 Dispatch</button>
  <button onclick="triggerEvent('offline')">💤 Offline</button>
  <button onclick="triggerEvent('online')">🟢 Online</button>
  <button onclick="triggerEvent('meeting')">🗣 Meeting</button>
  <button onclick="triggerEvent('addAgent')">➕ Add Agent</button>
</div>
<div class="tooltip" id="tooltip"></div>

<script>
const canvas = document.getElementById('office');
const ctx = canvas.getContext('2d');
const SCALE = 2;
canvas.style.width = canvas.width * SCALE + 'px';
canvas.style.height = canvas.height * SCALE + 'px';

// --- BACKGROUND IMAGE ---
const bgImg = new Image();
bgImg.src = './assets/sprites/office-floor.png';

// --- ZONES ---
const ZONES = {
  meeting:   { x: 30, y: 95, w: 170, h: 200 },
  workspace: { x: 215, y: 95, w: 250, h: 200 },
  lounge:    { x: 480, y: 95, w: 135, h: 200 },
};

// Desk positions (3x3 grid, well spaced)
const DESKS = [];
for (let r = 0; r < 3; r++)
  for (let c = 0; c < 3; c++)
    DESKS.push({ x: 255 + c * 80, y: 125 + r * 65 });

const LOUNGE_SPOTS = [
  {x:510,y:140},{x:555,y:160},{x:520,y:200},{x:560,y:230},{x:530,y:265}
];
const MEETING_SPOTS = [
  {x:65,y:155},{x:110,y:155},{x:155,y:155},
  {x:65,y:210},{x:110,y:210},{x:155,y:210}
];
const OUTSIDE = { x: 320, y: 380 };

// --- COLORS ---
const PALETTE = ['#f5a623','#7ed321','#4a90d9','#bd10e0','#50e3c2','#e35050','#f8e71c','#9013fe','#ff6b6b','#4ecdc4','#45b7d1','#96ceb4'];
const NAMES = ['Claude','Codex','Copilot','Kiro','Gemini','OpenCode','Hermes','Pi','Cursor','Kimi','Devin','Bolt'];

// --- DRAW HELPERS ---
function drawIsoRect(x, y, w, h, color) {
  ctx.fillStyle = color;
  ctx.fillRect(x, y, w, h);
}

// --- FURNITURE DRAWING ---
function drawDesk(x, y) {
  // Table top
  ctx.fillStyle = '#5a4530';
  ctx.fillRect(x-18, y-4, 36, 12);
  ctx.fillStyle = '#6b5540';
  ctx.fillRect(x-17, y-3, 34, 10);
  // Legs
  ctx.fillStyle = '#4a3520';
  ctx.fillRect(x-16, y+8, 3, 6);
  ctx.fillRect(x+13, y+8, 3, 6);
  // Monitor
  ctx.fillStyle = '#2a2a3a';
  ctx.fillRect(x-8, y-16, 16, 12);
  ctx.fillStyle = '#3388cc';
  ctx.fillRect(x-7, y-15, 14, 10);
  // Screen content
  ctx.fillStyle = '#55bbee';
  ctx.fillRect(x-5, y-13, 6, 1);
  ctx.fillRect(x-5, y-11, 9, 1);
  ctx.fillRect(x-5, y-9, 5, 1);
  // Monitor stand
  ctx.fillStyle = '#333';
  ctx.fillRect(x-1, y-4, 3, 2);
  // Keyboard
  ctx.fillStyle = '#444';
  ctx.fillRect(x-6, y, 12, 4);
  ctx.fillStyle = '#555';
  ctx.fillRect(x-5, y+1, 10, 2);
}

function drawSofa(x, y) {
  // Base
  ctx.fillStyle = '#2a3555';
  ctx.fillRect(x-16, y-6, 32, 14);
  // Cushions
  ctx.fillStyle = '#354570';
  ctx.fillRect(x-14, y-4, 13, 10);
  ctx.fillRect(x+1, y-4, 13, 10);
  // Back
  ctx.fillStyle = '#253050';
  ctx.fillRect(x-16, y-10, 32, 5);
  // Arms
  ctx.fillStyle = '#253050';
  ctx.fillRect(x-18, y-8, 4, 14);
  ctx.fillRect(x+14, y-8, 4, 14);
}

function drawWhiteboard(x, y) {
  // Frame
  ctx.fillStyle = '#666';
  ctx.fillRect(x-20, y-28, 40, 2);
  ctx.fillRect(x-20, y, 40, 2);
  ctx.fillRect(x-20, y-28, 2, 30);
  ctx.fillRect(x+18, y-28, 2, 30);
  // Board
  ctx.fillStyle = '#eee';
  ctx.fillRect(x-18, y-26, 36, 26);
  // Content
  ctx.fillStyle = '#e44';
  ctx.fillRect(x-14, y-22, 10, 2);
  ctx.fillStyle = '#4a4';
  ctx.fillRect(x-14, y-17, 16, 2);
  ctx.fillStyle = '#44a';
  ctx.fillRect(x-14, y-12, 8, 2);
  ctx.fillStyle = '#fa0';
  ctx.fillRect(x+2, y-22, 6, 6);
  ctx.fillStyle = '#4af';
  ctx.fillRect(x+10, y-16, 5, 5);
  // Stand legs
  ctx.fillStyle = '#555';
  ctx.fillRect(x-10, y+2, 2, 12);
  ctx.fillRect(x+8, y+2, 2, 12);
}

function drawCoffeeMachine(x, y) {
  // Counter
  ctx.fillStyle = '#5a4530';
  ctx.fillRect(x-10, y-2, 20, 6);
  // Machine body
  ctx.fillStyle = '#333';
  ctx.fillRect(x-7, y-18, 14, 16);
  ctx.fillStyle = '#444';
  ctx.fillRect(x-6, y-16, 8, 6);
  // Cup
  ctx.fillStyle = '#ddd';
  ctx.fillRect(x+2, y-5, 5, 5);
  ctx.fillStyle = '#8b5e3c';
  ctx.fillRect(x+3, y-4, 3, 3);
  // Steam
  ctx.fillStyle = 'rgba(255,255,255,0.4)';
  ctx.fillRect(x+3, y-8, 1, 2);
  ctx.fillRect(x+5, y-9, 1, 2);
}

function drawPlant(x, y) {
  // Pot
  ctx.fillStyle = '#8b5e3c';
  ctx.fillRect(x-5, y-2, 10, 8);
  ctx.fillStyle = '#a06b40';
  ctx.fillRect(x-6, y-3, 12, 3);
  // Soil
  ctx.fillStyle = '#3a2a1a';
  ctx.fillRect(x-4, y-3, 8, 2);
  // Leaves
  ctx.fillStyle = '#3a8a3a';
  ctx.fillRect(x-2, y-14, 4, 12);
  ctx.fillStyle = '#4a9a4a';
  ctx.fillRect(x-8, y-16, 6, 4);
  ctx.fillRect(x+2, y-18, 6, 4);
  ctx.fillRect(x-9, y-12, 5, 3);
  ctx.fillRect(x+4, y-13, 5, 3);
  ctx.fillStyle = '#5aaa5a';
  ctx.fillRect(x-6, y-15, 4, 2);
  ctx.fillRect(x+3, y-17, 4, 2);
}

// --- AGENT DRAWING ---
function drawAgent(agent) {
  const { x, y, color, opacity, state, frame } = agent;
  ctx.globalAlpha = opacity;

  const bobY = (state === 'idle') ? Math.sin(frame * 0.08) * 1 : 0;
  const py = y + bobY;

  // Shadow
  ctx.fillStyle = 'rgba(0,0,0,0.25)';
  ctx.beginPath();
  ctx.ellipse(x, py + 2, 7, 3, 0, 0, Math.PI * 2);
  ctx.fill();

  if (state === 'working') {
    // Sitting pose
    // Legs on chair
    ctx.fillStyle = '#2a2a44';
    ctx.fillRect(x-4, py-4, 8, 4);
    // Body
    ctx.fillStyle = color;
    ctx.fillRect(x-5, py-14, 10, 10);
    ctx.fillStyle = 'rgba(0,0,0,0.1)';
    ctx.fillRect(x-5, py-14, 2, 10);
    // Arms typing
    const armOff = Math.sin(frame * 0.3) * 1;
    ctx.fillStyle = '#ffc8a0';
    ctx.fillRect(x-7, py-10 + armOff, 2, 5);
    ctx.fillRect(x+5, py-10 - armOff, 2, 5);
    // Head
    ctx.fillStyle = '#ffd5b4';
    ctx.fillRect(x-4, py-20, 8, 6);
    // Hair
    ctx.fillStyle = darken(color, 0.5);
    ctx.fillRect(x-4, py-22, 8, 3);
    ctx.fillRect(x-5, py-21, 2, 2);
    ctx.fillRect(x+3, py-21, 2, 2);
    // Eyes
    ctx.fillStyle = '#222';
    ctx.fillRect(x-2, py-18, 1, 2);
    ctx.fillRect(x+2, py-18, 1, 2);
  } else if (state === 'walking') {
    const step = Math.sin(frame * 0.3) * 3;
    // Legs
    ctx.fillStyle = '#2a2a44';
    ctx.fillRect(x-3, py-4, 2, 5);
    ctx.fillRect(x+1 + step*0.2, py-4, 2, 5);
    ctx.fillStyle = '#1a1a2a';
    ctx.fillRect(x-3, py+1, 3, 2);
    ctx.fillRect(x+1, py+1, 3, 2);
    // Body
    ctx.fillStyle = color;
    ctx.fillRect(x-5, py-14, 10, 10);
    // Arms swinging
    ctx.fillStyle = '#ffc8a0';
    ctx.fillRect(x-7, py-11 + step, 2, 5);
    ctx.fillRect(x+5, py-11 - step, 2, 5);
    // Head
    ctx.fillStyle = '#ffd5b4';
    ctx.fillRect(x-4, py-20, 8, 6);
    ctx.fillStyle = darken(color, 0.5);
    ctx.fillRect(x-4, py-22, 8, 3);
    ctx.fillRect(x-5, py-21, 2, 2);
    ctx.fillRect(x+3, py-21, 2, 2);
    ctx.fillStyle = '#222';
    ctx.fillRect(x-2, py-18, 1, 2);
    ctx.fillRect(x+2, py-18, 1, 2);
  } else if (state === 'offline') {
    // Greyed out sleeping
    ctx.fillStyle = '#555';
    ctx.fillRect(x-4, py-4, 8, 5);
    ctx.fillStyle = '#666';
    ctx.fillRect(x-5, py-14, 10, 10);
    ctx.fillStyle = '#888';
    ctx.fillRect(x-4, py-20, 8, 6);
    ctx.fillStyle = '#777';
    ctx.fillRect(x-4, py-22, 8, 3);
    ctx.fillStyle = '#444';
    ctx.fillRect(x-2, py-17, 2, 1);
    ctx.fillRect(x+1, py-17, 2, 1);
  } else {
    // Idle / waiting / celebrating
    // Legs
    ctx.fillStyle = '#2a2a44';
    ctx.fillRect(x-3, py-4, 2, 5);
    ctx.fillRect(x+1, py-4, 2, 5);
    ctx.fillStyle = '#1a1a2a';
    ctx.fillRect(x-3, py+1, 3, 2);
    ctx.fillRect(x+1, py+1, 3, 2);
    // Body
    ctx.fillStyle = color;
    ctx.fillRect(x-5, py-14, 10, 10);
    ctx.fillStyle = 'rgba(255,255,255,0.15)';
    ctx.fillRect(x-2, py-14, 4, 1);
    // Arms
    ctx.fillStyle = '#ffc8a0';
    if (state === 'celebrating') {
      ctx.fillRect(x-7, py-18, 2, 5);
      ctx.fillRect(x+5, py-18, 2, 5);
    } else {
      ctx.fillRect(x-7, py-10, 2, 5);
      ctx.fillRect(x+5, py-10, 2, 5);
      // Coffee cup
      if (state === 'idle') {
        ctx.fillStyle = '#fff';
        ctx.fillRect(x+6, py-9, 4, 4);
        ctx.fillStyle = '#8b5e3c';
        ctx.fillRect(x+7, py-8, 2, 2);
      }
    }
    // Head
    ctx.fillStyle = '#ffd5b4';
    ctx.fillRect(x-4, py-20, 8, 6);
    ctx.fillStyle = darken(color, 0.5);
    ctx.fillRect(x-4, py-22, 8, 3);
    ctx.fillRect(x-5, py-21, 2, 2);
    ctx.fillRect(x+3, py-21, 2, 2);
    // Eyes
    ctx.fillStyle = '#222';
    ctx.fillRect(x-2, py-18, 1, 2);
    ctx.fillRect(x+2, py-18, 1, 2);
    // Smile
    if (state === 'celebrating') {
      ctx.fillStyle = '#c55';
      ctx.fillRect(x-1, py-15, 3, 1);
    }
  }

  ctx.globalAlpha = 1;

  // Name tag
  ctx.font = '7px monospace';
  const tw = ctx.measureText(agent.name).width;
  ctx.fillStyle = 'rgba(0,0,0,0.7)';
  ctx.fillRect(x - tw/2 - 2, py + 4, tw + 4, 9);
  ctx.fillStyle = agent.color;
  ctx.textAlign = 'center';
  ctx.fillText(agent.name, x, py + 11);

  // Bubble
  if (agent.bubble && agent.bubbleTimer > 0) {
    const by = py - 30;
    const lines = agent.bubbleText ? [agent.bubble, agent.bubbleText] : [agent.bubble];
    const bw = agent.bubbleText ? Math.max(14, ctx.measureText(agent.bubbleText).width + 8) : 14;
    const bh = lines.length > 1 ? 20 : 11;
    // Bubble bg
    ctx.fillStyle = 'rgba(20,20,40,0.9)';
    ctx.fillRect(x - bw/2, by - bh/2 - 2, bw, bh);
    ctx.fillStyle = 'rgba(127,219,202,0.6)';
    ctx.fillRect(x - bw/2, by - bh/2 - 2, bw, 1);
    // Tail
    ctx.fillStyle = 'rgba(20,20,40,0.9)';
    ctx.fillRect(x-1, by + bh/2 - 2, 3, 4);
    // Text
    ctx.fillStyle = '#fff';
    ctx.font = '8px monospace';
    ctx.textAlign = 'center';
    ctx.fillText(agent.bubble, x, by - (lines.length > 1 ? 2 : 0));
    if (agent.bubbleText) {
      ctx.fillStyle = '#7fdbca';
      ctx.font = '6px monospace';
      ctx.fillText(agent.bubbleText, x, by + 7);
    }
  }
}

function darken(hex, amt) {
  const r = Math.max(0, parseInt(hex.slice(1,3),16)*(1-amt));
  const g = Math.max(0, parseInt(hex.slice(3,5),16)*(1-amt));
  const b = Math.max(0, parseInt(hex.slice(5,7),16)*(1-amt));
  return `rgb(${r|0},${g|0},${b|0})`;
}

// --- SCENE OBJECTS (Y-sortable) ---
const furniture = [
  ...DESKS.map(d => ({ type:'desk', x:d.x, y:d.y, sortY:d.y+14 })),
  { type:'whiteboard', x:110, y:130, sortY:145 },
  { type:'sofa', x:520, y:150, sortY:158 },
  { type:'sofa', x:545, y:250, sortY:258 },
  { type:'coffee', x:580, y:125, sortY:133 },
  { type:'plant', x:35, y:275, sortY:283 },
  { type:'plant', x:600, y:275, sortY:283 },
  { type:'plant', x:195, y:110, sortY:118 },
];

const DRAW_FN = { desk:drawDesk, sofa:drawSofa, whiteboard:drawWhiteboard, coffee:drawCoffeeMachine, plant:drawPlant };

// --- AGENTS ---
const agents = [];
function createAgent(name, color, zone, slot) {
  const pos = getZonePos(zone, slot);
  return { name, color, zone, slot,
    state: zone==='desks'?'working': zone==='lounge'?'idle': zone==='meeting'?'waiting':'offline',
    x:pos.x, y:pos.y, path:null, pathIdx:0,
    frame: Math.random()*100|0, bubble:null, bubbleText:null, bubbleTimer:0,
    opacity: zone==='outside'?0.4:1, sortY:pos.y };
}
function getZonePos(zone, slot) {
  if (zone==='desks') return {x:DESKS[slot%DESKS.length].x, y:DESKS[slot%DESKS.length].y+22};
  if (zone==='lounge') return LOUNGE_SPOTS[slot%LOUNGE_SPOTS.length];
  if (zone==='meeting') return MEETING_SPOTS[slot%MEETING_SPOTS.length];
  return OUTSIDE;
}

for (let i=0;i<6;i++) agents.push(createAgent(NAMES[i],PALETTE[i],'desks',i));
for (let i=6;i<8;i++) agents.push(createAgent(NAMES[i],PALETTE[i],'lounge',i-6));

// --- PATHFINDING ---
function moveTo(agent, zone, slot) {
  const target = getZonePos(zone, slot);
  const mid = {x:340,y:300}, dExit={x:340,y:280}, lEntry={x:480,y:200}, mEntry={x:200,y:180};
  let path;
  if (agent.zone==='desks'&&zone==='lounge') path=[{x:agent.x,y:agent.y},dExit,lEntry,target];
  else if (agent.zone==='lounge'&&zone==='desks') path=[{x:agent.x,y:agent.y},lEntry,dExit,target];
  else if (agent.zone==='desks'&&zone==='meeting') path=[{x:agent.x,y:agent.y},dExit,mEntry,target];
  else if (agent.zone==='meeting'&&zone==='desks') path=[{x:agent.x,y:agent.y},mEntry,dExit,target];
  else if (zone==='outside') path=[{x:agent.x,y:agent.y},mid,OUTSIDE];
  else if (agent.zone==='outside') path=[{x:agent.x,y:agent.y},mid,dExit,target];
  else path=[{x:agent.x,y:agent.y},target];
  agent.path=path; agent.pathIdx=1; agent.zone=zone; agent.slot=slot;
}

// --- LOOP ---
function update() {
  agents.forEach(a => {
    a.frame++;
    if (a.bubbleTimer>0){a.bubbleTimer--;if(a.bubbleTimer===0)a.bubble=null;}
    if (a.path&&a.pathIdx<a.path.length) {
      const t=a.path[a.pathIdx];
      const dx=t.x-a.x, dy=t.y-a.y, dist=Math.sqrt(dx*dx+dy*dy);
      if (dist<2){a.x=t.x;a.y=t.y;a.pathIdx++;if(a.pathIdx>=a.path.length)a.path=null;}
      else {const spd=1.8;a.x+=dx/dist*spd;a.y+=dy/dist*spd;}
      a.state='walking';
    } else if (!a.path) {
      if (a.zone==='desks') a.state='working';
      else if (a.zone==='lounge') a.state='idle';
      else if (a.zone==='meeting') a.state='waiting';
      else {a.state='offline';a.opacity=0.4;}
    }
    a.sortY=a.y;
  });
}

function render() {
  ctx.clearRect(0,0,640,400);
  // Background
  if (bgImg.complete) ctx.drawImage(bgImg,0,0,640,400);
  else { ctx.fillStyle='#1a1a2e'; ctx.fillRect(0,0,640,400); }

  // Zone labels
  ctx.fillStyle='rgba(255,255,255,0.2)';
  ctx.font='9px monospace'; ctx.textAlign='center';
  ctx.fillText('MEETING',ZONES.meeting.x+ZONES.meeting.w/2, ZONES.meeting.y+ZONES.meeting.h+12);
  ctx.fillText('WORKSPACE',ZONES.workspace.x+ZONES.workspace.w/2, ZONES.workspace.y+ZONES.workspace.h+12);
  ctx.fillText('LOUNGE',ZONES.lounge.x+ZONES.lounge.w/2, ZONES.lounge.y+ZONES.lounge.h+12);

  // Y-sort all objects
  const queue = [
    ...furniture.map(f=>({type:'f',data:f,sortY:f.sortY})),
    ...agents.map(a=>({type:'a',data:a,sortY:a.sortY}))
  ];
  queue.sort((a,b)=>a.sortY-b.sortY);
  queue.forEach(item => {
    if (item.type==='f') DRAW_FN[item.data.type](item.data.x, item.data.y);
    else drawAgent(item.data);
  });

  // HUD
  ctx.fillStyle='rgba(0,0,0,0.8)';
  ctx.fillRect(0,385,640,15);
  ctx.fillStyle='#7fdbca';ctx.font='9px monospace';ctx.textAlign='left';
  const w=agents.filter(a=>a.state==='working').length;
  const i=agents.filter(a=>a.state==='idle'||a.state==='waiting').length;
  const o=agents.filter(a=>a.state==='offline').length;
  ctx.fillText(`⚡ Working: ${w}   ☕ Idle: ${i}   💤 Offline: ${o}   👥 Total: ${agents.length}`,12,395);
}

function loop(){update();render();requestAnimationFrame(loop);}
loop();

// --- EVENTS ---
// Task names for realism
const TASKS = ['Fix auth bug','Add API endpoint','Refactor DB','Write tests','Update docs','Deploy v2.1','Code review','Migrate schema','Add caching','Fix memory leak'];
let taskIdx = 0;
function nextTask() { return TASKS[taskIdx++ % TASKS.length]; }

function triggerEvent(type) {
  if (type==='complete') {
    const a=agents.find(a=>a.state==='working');
    if(a){a.bubble='✅';a.bubbleText=nextTask()+' done';a.bubbleTimer=100;a.state='celebrating';setTimeout(()=>moveTo(a,'lounge',agents.filter(x=>x.zone==='lounge').length),1800);}
  } else if (type==='fail') {
    const a=agents.find(a=>a.state==='working');
    if(a){a.bubble='❌';a.bubbleText='Build failed';a.bubbleTimer=120;}
  } else if (type==='dispatch') {
    const a=agents.find(a=>a.state==='idle'||a.state==='waiting');
    if(a){const t=nextTask();a.bubble='📋';a.bubbleText=t;a.bubbleTimer=80;a.opacity=1;moveTo(a,'desks',agents.filter(x=>x.zone==='desks').length);}
  } else if (type==='offline') {
    const a=agents.find(a=>a.state==='working'||a.state==='idle');
    if(a){a.bubble='💤';a.bubbleText='Disconnected';a.bubbleTimer=80;moveTo(a,'outside',0);}
  } else if (type==='online') {
    const a=agents.find(a=>a.state==='offline');
    if(a){a.opacity=1;a.bubble='🟢';a.bubbleText='Back online';a.bubbleTimer=70;moveTo(a,'lounge',agents.filter(x=>x.zone==='lounge').length);}
  } else if (type==='meeting') {
    const avail=agents.filter(a=>a.state==='working'||a.state==='idle');
    for(let i=0;i<Math.min(avail.length,4);i++){
      const a=avail[i];a.bubble='🗣';a.bubbleText='Sprint planning';a.bubbleTimer=80;
      setTimeout(()=>moveTo(a,'meeting',i),i*400);
    }
  } else if (type==='addAgent') {
    if(agents.length<12){
      const idx=agents.length;
      const a=createAgent(NAMES[idx%NAMES.length],PALETTE[idx%PALETTE.length],'outside',0);
      agents.push(a);
      setTimeout(()=>{a.opacity=1;a.bubble='🟢';a.bubbleText='Joined workspace';a.bubbleTimer=70;moveTo(a,'desks',agents.filter(x=>x.zone==='desks').length);},300);
    }
  }
}

// --- TOOLTIP ---
const tooltip=document.getElementById('tooltip');
canvas.addEventListener('mousemove',e=>{
  const rect=canvas.getBoundingClientRect();
  const mx=(e.clientX-rect.left)/SCALE, my=(e.clientY-rect.top)/SCALE;
  const hit=agents.find(a=>Math.abs(a.x-mx)<12&&Math.abs(a.y-10-my)<18);
  if(hit){
    tooltip.style.display='block';
    tooltip.style.left=e.clientX+12+'px';
    tooltip.style.top=e.clientY-10+'px';
    const label={working:'⚡ Working',idle:'☕ Idle',offline:'💤 Offline',walking:'🚶 Moving',waiting:'⏳ Waiting',celebrating:'🎉 Done!'}[hit.state]||hit.state;
    tooltip.textContent=`${hit.name} — ${label}`;
  } else tooltip.style.display='none';
});
canvas.addEventListener('mouseleave',()=>tooltip.style.display='none');
</script>
</body>
